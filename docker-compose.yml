version: '3.8'

services:
  # 1. 데이터베이스 (MySQL)
  mysql:
    image: mysql:8.0
    container_name: pkm-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD} # .env에서 가져옴
      MYSQL_DATABASE: pokemon_store
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. 캐시 및 분산 락 (Redis)
  redis:
    image: redis:alpine
    container_name: pkm-redis
    ports:
      - "6379:6379"

  # 3. 백엔드 (Spring Boot)
  backend:
    build:
      context: ./backend
    container_name: pkm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod 
      - PROD_DB_URL=${DB_URL}
      - PROD_DB_USERNAME=root
      - PROD_DB_PASSWORD=${DB_ROOT_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      
      # AWS 키 주입
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}

      # 보안 및 결제 키 주입
      - PROD_JWT_SECRET=${PROD_JWT_SECRET}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
    depends_on:
      - mysql
      - redis

  # 4. 프론트엔드 (React / Vite)
  frontend:
    build:
      context: ./frontend
    container_name: pkm-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data: