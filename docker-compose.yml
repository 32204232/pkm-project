version: '3.8'

services:
  # 1. 데이터베이스 (MySQL)
  mysql:
    image: mysql:8.0
    container_name: pkm-mysql
    ports:
      - "3306:3306"
    environment:
      # [주의] launch.json과 password를 통일해야 합니다. 여기서는 vhzptahs12로 맞춥니다.
      MYSQL_ROOT_PASSWORD: vhzptahs12 
      MYSQL_DATABASE: pokemon_store
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. 캐시 및 분산 락 (Redis)
  redis:
    image: redis:alpine
    container_name: pkm-redis
    ports:
      - "6379:6379"

  # 3. 백엔드 (Spring Boot)
  backend:
    build:
      context: ./backend
    container_name: pkm-backend
    ports:
      - "8080:8080"
    environment:
      # DB 연결 정보 (localhost 대신 서비스명 'mysql' 사용)
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/pokemon_store?serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=vhzptahs12
      - SPRING_DATA_REDIS_HOST=redis

      # [★추가★] S3 설정 (launch.json에 있던 값 이식)
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}

      # [★추가★] 보안을 위해 환경변수로 관리해야 하는 값들
      - JWT_SECRET=my-super-secret-key-for-pokemon-store-backend-must-be-long
      - TOSS_SECRET_KEY=test_sk_P9BRQmyarYxBGdbo6o4vVJ07KzLN
    depends_on:
      - mysql
      - redis

  # 4. 프론트엔드 (React / Vite)
  frontend:
    build:
      context: ./frontend
    container_name: pkm-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data: