# backend/src/main/resources/application.yaml

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local} # 기본값은 local로 설정
    group:
      local: "common"
      prod: "common"

---
# 1. 공통 설정 (common)
spring:
  config:
    activate:
      on-profile: common
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  cloud:
    aws:
      s3:
        bucket: pkm-store-image-bucket
      region:
        static: ap-southeast-2
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

# 토스페이먼츠 설정 (환경변수 주입 필수)
toss:
  secret-key: ${TOSS_SECRET_KEY}

---
# 2. 로컬 개발 환경 (local)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/pokemon_store?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${LOCAL_DB_PASSWORD:vhzptahs12} # 로컬은 기본값 허용 (보안주의)
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # 로컬은 테이블 자동 생성/수정 허용
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000

jwt:
  secret: ${LOCAL_JWT_SECRET:vocal-music-major-hyunbeom-secret-key-for-local-only-12345}
  expiration: 3600000

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

---
# 3. 운영 환경 (prod) - 가장 중요한 보안 설정
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate # [중요] 운영 DB 구조 변경 절대 금지 (검증만 수행)
    show-sql: false # 운영 성능을 위해 SQL 로그는 끕니다
    properties:
      hibernate:
        default_batch_fetch_size: 500 # 운영 환경에 맞는 사이즈 조절

jwt:
  secret: ${PROD_JWT_SECRET} # 반드시 외부 환경변수에서 주입
  expiration: 1800000 # 운영은 보안을 위해 30분으로 단축 권장

logging:
  level:
    root: info # 운영 로그는 필요한 정보만 남깁니다