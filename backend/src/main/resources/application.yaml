spring:
  # 1. 데이터베이스 설정
  datasource:
    url: jdbc:mysql://localhost:3306/pokemon_store?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: ${DB_PASSWORD} # [수정] 이것도 launch.json에 "DB_PASSWORD": "ehdgusqja12!" 로 빼주세요!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. JPA 설정
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000

  # 3. AWS S3 설정 (spring 아래로 쏙 들어왔습니다!)
  cloud:
    aws:
      s3:
        bucket: pkm-store-image-bucket
      region:
        static: ap-southeast-2 # [수정] 서울 리전으로 변경 완료!
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

# 로깅 설정 (spring과 같은 레벨)
logging:
  level:
    org.hibernate.SQL: debug

# JWT 설정 (spring과 같은 레벨)
jwt:
  secret: my-super-secret-key-for-pokemon-store-backend-must-be-long
  expiration: 3600000