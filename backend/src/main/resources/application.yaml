spring:
  datasource:
    # 다시 localhost -> mysql 로 변경!
    url: jdbc:mysql://mysql:3306/pokemon_store?serverTimezone=Asia/Seoul
    username: root
    password: vhzptahs12
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  data:
    redis:
      # 다시 localhost -> redis 로 변경!
      host: redis
      port: 6379

  # 2. JPA 설정
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    # [★핵심 해결책★] MySQL 8 버전의 문법(Dialect)을 쓰겠다고 명시적으로 박아줍니다.
    database-platform: org.hibernate.dialect.MySQL8Dialect 
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000
        use_sql_comments: true
  # 3. AWS S3 설정
  cloud:
    aws:
      s3:
        bucket: pkm-store-image-bucket
      region:
        # [★수정] ap-northeast-2 가 서울입니다! (southeast는 호주 시드니입니다)
        static: ap-northeast-2 
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

# 로깅 설정
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace 

# JWT 설정
jwt:
  secret: my-super-secret-key-for-pokemon-store-backend-must-be-long
  expiration: 3600000

